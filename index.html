<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0; /* 稍微調亮文字對比 */
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 15px 20px 50px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; /* 圓角稍微加大，更有現代感 */
            padding: 22px 24px; 
            margin: 14px 0; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4); 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .content-area {
            flex: 1; 
            text-align: left; 
            padding-right: 10px;
        }

        /* 最終調大的泰文字體 */
        .thai { 
            font-size: 2.05rem; /* 再增加約 2-3pt，總計較初始版本大幅提升 */
            line-height: 1.45;  /* 確保泰文音調符號有足夠空間 */
            margin-bottom: 8px; 
            font-weight: 700; 
            color: var(--text-color);
            word-wrap: break-word;
            letter-spacing: 0.5px;
        }

        /* 中文也微調大一點，保持比例 */
        .chinese { 
            font-size: 1.15rem; 
            color: var(--sub-text); 
            font-weight: 400;
        }

        button { 
            border: none; 
            background: transparent;
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
            padding: 5px;
        }

        button:active { 
            opacity: 0.4; 
            transform: scale(1.2); 
        }

        .btn-speak { 
            color: var(--accent-color); 
            font-size: 2rem; /* 喇叭圖示也隨之放大 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
        }

        #loading { margin-top: 120px; font-size: 1.2rem; color: var(--sub-text); }
    </style>
</head>
<body>

    <div id="loading">正在準備句子...</div>
    <div id="app"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv'; // 記得替換成你的 Google Sheets CSV 網址
        let sentences = [];

        async function fetchData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                sentences = rows.map(row => {
                    const columns = row.split(',');
                    return { thai: columns[0], chinese: columns[1] };
                }).filter(s => s.thai && s.thai.trim() !== "");
                displayRandom();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = '載入失敗，請下拉重新整理';
            }
        }

        function displayRandom() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            if (sentences.length === 0) return;

            const shuffled = [...sentences].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 5);

            selected.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="content-area">
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        fetchData();
    </script>
</body>
</html>

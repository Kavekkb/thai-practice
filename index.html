<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
            --btn-inactive: #444444;
            --btn-active: #3498db;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 10px 20px 50px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* 資料來源切換按鈕區 */
        .source-selector {
            width: 100%;
            max-width: 420px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .source-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--btn-inactive);
            color: var(--sub-text);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .source-btn.active {
            background: var(--btn-active);
            color: white;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 22px 24px; 
            margin: 12px 0; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4); 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .content-area {
            flex: 1; 
            text-align: left; 
            padding-right: 10px;
        }

        .thai { 
            font-size: 2.05rem; 
            line-height: 1.45;
            margin-bottom: 8px; 
            font-weight: 700; 
            color: var(--text-color);
            word-wrap: break-word;
        }

        .chinese { 
            font-size: 1.15rem; 
            color: var(--sub-text); 
        }

        button.btn-speak { 
            border: none;
            background: transparent;
            color: var(--accent-color); 
            font-size: 2rem; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            transition: transform 0.1s;
        }

        button.btn-speak:active { 
            opacity: 0.4; 
            transform: scale(1.2); 
        }

        #loading { margin-top: 100px; font-size: 1.1rem; color: var(--sub-text); }
    </style>
</head>
<body>

    <div class="source-selector">
        <button id="btn-ai" class="source-btn active" onclick="switchSource('ai')">AI_Get</button>
        <button id="btn-thai" class="source-btn" onclick="switchSource('thai')">時時泰</button>
    </div>

    <div id="loading">載入資料中...</div>
    <div id="app"></div>

    <script>
        const sources = {
            ai: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv",
            thai: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjm7j2vq2047v5aLY3tNBU_va83hqS9u6_skG35lTdtVxK4nCNC7qRoePHg_FsbdxvjbkR0s-JxmNt/pub?output=csv"
        };

        let currentSourceKey = 'ai';
        let sentences = [];

        // 切換資料來源
        async function switchSource(key) {
            currentSourceKey = key;
            
            // 更新按鈕樣式
            document.getElementById('btn-ai').classList.toggle('active', key === 'ai');
            document.getElementById('btn-thai').classList.toggle('active', key === 'thai');
            
            // 重新讀取資料
            document.getElementById('app').innerHTML = '';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = '更換來源中...';
            
            await fetchData();
        }

        async function fetchData() {
            try {
                const response = await fetch(sources[currentSourceKey]);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                sentences = rows.map(row => {
                    const columns = row.split(',');
                    return { thai: columns[0], chinese: columns[1] };
                }).filter(s => s.thai && s.thai.trim() !== "");
                
                displayRandom();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = '載入失敗，請檢查網路';
            }
        }

        function displayRandom() {
            window.scrollTo(0, 0);
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            if (sentences.length === 0) return;

            const shuffled = [...sentences].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 5);

            selected.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="content-area">
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        // 初始化
        fetchData();
    </script>
</body>
</html>

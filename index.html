<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X7B1H72720"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-X7B1H72720');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰難了舌頭已打結</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --btn-inactive: #3a3a3a;
            --search-bg: #333;
            --search-border: #444;
            --nav-bg: #252525;
            --accent-color: #e67e22;
            --btn-active: #3498db;
            --link-color: #2ecc71;
            --danger-color: #e74c3c;
            --star-color: #f1c40f;
            --thai-size: 32px;
            --zh-size: 19.2px;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --sub-text: #7f8c8d;
            --btn-inactive: #e0e0e0;
            --search-bg: #ffffff;
            --search-border: #bdc3c7;
            --nav-bg: #ecf0f1;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); color: var(--text-color);
            padding: 20px 15px 60px 15px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .header {
            width: 100%; max-width: 480px; display: flex;
            justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .app-title { font-size: 1.4rem; font-weight: bold; color: var(--btn-active); letter-spacing: 1px; }
        .menu-toggle {
            background: var(--nav-bg); border: 1px solid var(--search-border);
            color: var(--text-color); font-size: 1.5rem; padding: 8px 12px;
            border-radius: 10px; cursor: pointer; z-index: 1001;
        }

        .control-area {
            width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px;
        }
        .search-container { width: 100%; }
        #search-input {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            border: 2px solid var(--search-border); background: var(--search-bg);
            color: var(--text-color); font-size: 1rem; box-sizing: border-box; outline: none;
        }
        
        .action-row {
            display: flex; align-items: center; width: 100%; gap: 8px;
        }
        .left-actions {
            display: flex; gap: 6px; flex-grow: 1;
        }

        .quiz-toggle, .refresh-btn {
            background: var(--btn-inactive); color: var(--text-color); border: 1px solid var(--search-border);
            border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 0.85rem; font-weight: bold;
            width: auto; white-space: nowrap; display: flex; align-items: center; gap: 4px;
        }
        .quiz-toggle.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 20px; padding: 24px; margin: 12px 0; width: 100%; max-width: 480px; 
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative; min-height: 120px; transition: transform 0.1s; cursor: pointer;
        }
        .card:active { transform: scale(0.98); }
        .card-content { flex-grow: 1; padding-right: 15px; }

        .quiz-mode .chinese { opacity: 0; transition: opacity 0.3s; }
        .card.revealed .chinese { opacity: 1; color: var(--accent-color); }

        .thai { 
            font-family: "Leelawadee UI", "Ayuthaya", "Thonburi", sans-serif;
            font-size: var(--thai-size); line-height: 1.6; margin-bottom: 10px; 
            font-weight: 700; letter-spacing: 0.5px; word-break: break-word; display: block;
        }
        .chinese { font-size: var(--zh-size); color: var(--sub-text); margin-top: 8px; word-break: break-word; }
        
        /* 右側動作區：垂直排列標籤與圖示 */
        .card-action {
            display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 12px; min-width: 60px;
        }

        /* 修正後的來源標籤：靠右顯示 */
        .source-tag {
            font-size: 0.65rem; color: var(--sub-text);
            background: rgba(128, 128, 128, 0.1); padding: 2px 6px;
            border-radius: 4px; border: 1px solid rgba(128, 128, 128, 0.2);
            white-space: nowrap;
        }

        .btn-speak { border: none; background: transparent; color: var(--accent-color); font-size: 2.2rem; cursor: pointer; transition: all 0.2s; padding: 0; }
        .btn-speak.playing { transform: scale(1.2); color: var(--btn-active); filter: drop-shadow(0 0 5px var(--btn-active)); }

        .sidebar { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--bg-color); box-shadow: -5px 0 15px rgba(0,0,0,0.3); transition: 0.3s ease; z-index: 2000; padding: 25px; overflow-y: auto; box-sizing: border-box; }
        .sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        .sidebar-section { margin-bottom: 25px; }
        .sidebar-label { color: var(--sub-text); font-size: 1rem; font-weight: bold; margin-bottom: 12px; display: block; border-bottom: 1px solid var(--search-border); padding-bottom: 8px; }
        .grid-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .source-btn { padding: 14px 2px; border-radius: 10px; border: none; background: var(--btn-inactive); color: var(--sub-text); font-weight: 600; font-size: 1rem; cursor: pointer; }
        .source-btn.active, .side-full-btn.active { background: var(--btn-active) !important; color: white !important; }
        .side-full-btn { width: 100%; padding: 16px; border-radius: 10px; border: none; background: var(--nav-bg); color: var(--text-color); margin-bottom: 10px; text-align: left; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        
        .modal-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 3000; display: none; flex-direction: column; align-items: center; padding: 30px 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .setting-group { background: var(--card-bg); padding: 15px 20px; border-radius: 15px; border: 1px solid var(--search-border); margin-bottom: 10px; }
        .info-text { font-size: 0.95rem; line-height: 1.6; color: var(--text-color); margin-bottom: 5px; }
        .desc-text { font-size: 0.8rem; color: var(--sub-text); margin-top: 5px; }
        .close-btn { background: var(--danger-color); color: white; padding: 16px; border-radius: 12px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        
        #loading { margin-top: 50px; color: var(--sub-text); }
        #search-info { color: var(--sub-text); margin-bottom: 0; font-size: 0.85rem; text-align: right; }
        input[type="number"] { background: var(--search-bg); color: var(--text-color); border: 1px solid var(--search-border); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="app-title">泰難了舌頭已打結</div>
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>

    <div class="control-area">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 5px; margin-bottom: -5px;">
            <div onclick="openModal('about-page')" style="cursor: pointer; color: var(--btn-active); font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                ‼️點我點我我叫你點‼️
            </div>
            <div id="search-info"></div>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" maxlength="50" autocomplete="off" placeholder="輸入泰文或中文搜尋....." oninput="handleSearch()">
        </div>
        <div class="action-row">
            <div class="left-actions">
                <button id="quiz-btn" class="quiz-toggle" onclick="toggleQuizMode()">👁️ 測驗模式</button>
                <button id="autoplay-btn" class="quiz-toggle" onclick="toggleAutoplay()">📢 輪播模式</button>
            </div>
            <div id="refresh-btn-main" class="refresh-btn" onclick="handleRefresh()">
                <span>🔄 更新</span>
            </div>
        </div>
    </div>

    <div id="loading">同步雲端資料中...</div>
    <div id="app"></div>

    <div id="overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-section">
            <span class="sidebar-label">主要模式</span>
            <button id="btn-random" class="side-full-btn active" onclick="switchMode('random')">🎲 隨機字卡</button>
            <button id="btn-fav" class="side-full-btn" style="color:var(--star-color);" onclick="showFavorites(this)">⭐ 已加星號</button>
        </div>
        <div class="sidebar-section">
            <span class="sidebar-label">分類詞庫</span>
            <div class="grid-selector">
                <button class="source-btn" onclick="switchSource('custom', this)">網抓</button>
                <button class="source-btn" onclick="switchSource('thai2', this)">時泰</button>
                <button class="source-btn" onclick="switchSource('calendar', this)">月份星期</button>
                <button class="source-btn" onclick="switchSource('anki', this)">Anki</button>
                <button class="source-btn" onclick="switchSource('line', this)">Line</button>
                <button class="source-btn" onclick="switchSource('self', this)">自建</button>
            </div>
        </div>
        <div class="sidebar-section">
            <span class="sidebar-label">系統與說明</span>
            <button class="side-full-btn" onclick="openModal('about-page')">ℹ️ 關於本站</button>
            <button class="side-full-btn" onclick="openModal('settings-page')">⚙️ 偏好設定</button>
            <button class="side-full-btn" onclick="openModal('links-page')">🔗 外部資源</button>
            <button class="side-full-btn" onclick="openModal('privacy-page')">🛡️ 資安與隱私</button>
        </div>
        <button class="close-btn" style="background: var(--nav-bg); color: var(--sub-text); font-size: 1rem;" onclick="toggleSidebar()">關閉選單</button>
    </div>

    <div id="about-page" class="modal-page">
        <div class="modal-content">
            <h2 style="text-align:center">ℹ️ 關於本站</h2>
            <button class="close-btn" onclick="closeModal('about-page')">返回</button>
        </div>
    </div>

    <script>
        const base_url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv`;
        
        const gids = { 
            custom: { name: "網抓", id: "538865502" }, 
            thai2: { name: "時泰", id: "2121125782" }, 
            calendar: { name: "月份星期", id: "1685596903" }, 
            anki: { name: "Anki", id: "248374266" }, 
            line: { name: "Line", id: "1404447959" },
            self: { name: "自建", id: "1725449061" }
        };

        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('thai_favs')) || [];
        let currentMode = 'random';
        let isQuizMode = false;
        let isAutoplay = false;
        let searchTimer;
        let currentSpeed = parseFloat(localStorage.getItem('thai_speed')) || 1.0;
        let quizCount = parseInt(localStorage.getItem('thai_quiz_count')) || 10;

        function renderList(list) {
            const container = document.getElementById('app');
            container.innerHTML = list.length === 0 ? '<div style="margin-top:30px;color:#666;text-align:center;">無相關詞庫</div>' : '';
            container.className = isQuizMode ? 'quiz-mode' : '';
            
            list.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `card-${index}`;
                div.onclick = function(e) { if (isQuizMode && !e.target.closest('button')) this.classList.toggle('revealed'); };
                
                // 將 source-tag 移動至 card-action 中
                div.innerHTML = `
                    <div class="card-content">
                        <div class="thai" lang="th">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <div class="card-action">
                        <button class="btn-speak" onclick="speak('${item.thai}', this)">🔊</button>
                        <div class="source-tag">${item.source}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function initAllData() {
            try {
                const fetchPromises = Object.keys(gids).map(async (key) => {
                    const response = await fetch(`${base_url}&gid=${gids[key].id}&t=${Date.now()}`);
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    return rows.map(row => {
                        const cols = row.split(',');
                        let t = (cols.length > 2 ? cols[1] : cols[0])?.trim();
                        let c = (cols.length > 2 ? cols[2] : cols[1])?.trim();
                        return { id: btoa(unescape(encodeURIComponent(t))), thai: t, chinese: c, source: gids[key].name };
                    }).filter(item => item.thai);
                });
                const results = await Promise.all(fetchPromises);
                allData = results.flat();
                document.getElementById('loading').style.display = 'none';
                displayRandom();
            } catch (e) { document.getElementById('loading').innerText = '資料同步失敗'; }
        }

        function displayRandom() {
            currentMode = 'random';
            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, quizCount);
            renderList(shuffled);
        }

        function handleRefresh() {
            if (currentMode === 'random') displayRandom();
            else switchSource(currentMode, null);
        }

        function switchSource(key, btn) {
            currentMode = key;
            const filtered = allData.filter(item => item.source === gids[key].name);
            const shuffled = [...filtered].sort(() => 0.5 - Math.random()).slice(0, quizCount);
            renderList(shuffled);
            if (btn) {
                document.querySelectorAll('.source-btn, .side-full-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                toggleSidebar();
            }
        }

        function handleSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const cleanInput = document.getElementById('search-input').value.trim().toLowerCase();
                if (!cleanInput) { handleRefresh(); return; }
                const results = allData.filter(item => item.thai.toLowerCase().includes(cleanInput) || item.chinese.toLowerCase().includes(cleanInput));
                renderList(results);
            }, 300);
        }

        function speak(text, btnElement) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'th-TH';
            msg.rate = currentSpeed;
            if (btnElement) btnElement.classList.add('playing');
            msg.onend = () => { if (btnElement) btnElement.classList.remove('playing'); };
            window.speechSynthesis.speak(msg);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleQuizMode() { isQuizMode = !isQuizMode; document.getElementById('quiz-btn').classList.toggle('active'); handleRefresh(); }
        function toggleAutoplay() { /* 此處可補上輪播邏輯 */ }
        function updateFontSize(val) { document.documentElement.style.setProperty('--thai-size', val + 'px'); }

        initAllData();
    </script>
</body>
</html>
